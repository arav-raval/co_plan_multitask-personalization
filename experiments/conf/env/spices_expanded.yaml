# Expanded 8-recipe pool: original 4 + MoroccanTagine, EthiopianWat, ThaiCurryComplex, SpanishPaella
# 55 unique spices (vs 37 in original). Used for stronger cross-recipe transfer evidence.
env:
  _target_: "multitask_personalization.envs.spices.spices_env.SpiceEnv"
  scene_spec:
    _target_: "multitask_personalization.envs.spices.spices_experiment.build_spice_scene_spec_expanded_multi"
  hidden_spec:
    _target_: "multitask_personalization.envs.spices.spices_env.SpiceHiddenSpec"
    preferred_actor: {}
    stochastic_preferences: false
    hidden_hbm:
      _target_: "multitask_personalization.envs.spices.spices_experiment.build_spice_experiment_hidden_hbm_expanded"
      hidden_hbm_config_name: SpiceSpecificHumanRecipeConflict
  verbose: false
train_env: {}
eval_env: {}
max_environment_steps: 5000
eval_frequency: 250
max_eval_episode_length: 50
num_eval_trials: 50
dt: 0.01
csp_solver:
  max_iters: 2500
  num_improvements: 500
  max_improvement_attempts: 100
