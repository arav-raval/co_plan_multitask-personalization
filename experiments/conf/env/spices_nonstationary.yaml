# Non-stationarity experiment: preferences shift at step 2500 (midpoint).
# Pre-shift: SpiceSpecificHumanRecipeConflict (strong theta, recipe-specific phi overrides)
# Post-shift: SpiceSpecificHumanShifted (heat-tolerant, less sweet/aromatic)
# DBTL's online variational updates should recover faster than CBTL's batch retrain.
#
# Longer run (10000 steps) with frequent eval (every 250) to capture recovery dynamics.
# Eval always uses the TRAINING env's current hidden HBM (pre- or post-shift).
env:
  _target_: "multitask_personalization.envs.spices.spices_env.SpiceEnv"
  scene_spec:
    _target_: "multitask_personalization.envs.spices.spices_experiment.build_spice_scene_spec_default_multi"
  hidden_spec:
    _target_: "multitask_personalization.envs.spices.spices_env.SpiceHiddenSpec"
    preferred_actor: {}
    stochastic_preferences: false
    hidden_hbm:
      _target_: "multitask_personalization.envs.spices.spices_experiment.build_spice_experiment_hidden_hbm_default_multi"
      hidden_hbm_config_name: SpiceSpecificHumanRecipeConflict
    shift_hidden_hbm:
      _target_: "multitask_personalization.envs.spices.spices_experiment.build_spice_shift_hidden_hbm_default_multi"
      shift_config_name: SpiceSpecificHumanShifted
    preference_shift_step: 2500
  verbose: false
train_env: {}
eval_env: {}
max_environment_steps: 5000
eval_frequency: 250
max_eval_episode_length: 50
num_eval_trials: 50
dt: 0.01
csp_solver:
  max_iters: 2500
  num_improvements: 500
  max_improvement_attempts: 100
